kind = "web"
previewPath = "/"
title = "مدرسة ضياء المستقبل"
version = "1.0.0"
id = "artifacts/near-future-school"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19878

[services.development]
run = "pnpm --filter @workspace/near-future-school run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/near-future-school", "run", "build" ]
publicDir = "artifacts/near-future-school/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19878"
BASE_PATH = "/"
